
<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PV+ Solar Health Report</title>
<style>
:root{--b1:#1c4f7c;--b2:#138aa0;--bg:#eef4f8;--card:#fff;--line:#d8e5f0;--txt:#07345f;--g:#16a34a;--y:#d9a100;--r:#dc2626}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--txt)}
.hero{background:linear-gradient(rgba(20,58,92,.88),rgba(18,116,135,.88)),linear-gradient(135deg,rgba(255,255,255,.12) 25%,transparent 25%) 0 0/28px 28px,linear-gradient(90deg,var(--b1),var(--b2));color:#fff;padding:28px 18px}
.hero-inner{max-width:1180px;margin:auto;display:flex;gap:18px;align-items:center}.logo{background:#fff;border-radius:16px;padding:10px;font-weight:900;font-size:32px;color:#1c4f7c;min-width:78px;text-align:center}
.hero h1{margin:0;font-size:32px}.wrap{max-width:1180px;margin:auto;padding:18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.card{background:white;border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 8px 24px rgba(18,52,79,.06);margin-bottom:16px}
h2{margin:0 0 12px}label{display:block;font-weight:800;font-size:13px;margin:10px 0 6px;letter-spacing:.04em;color:#58718a;text-transform:uppercase}
input,select,textarea{width:100%;padding:12px;border:1px solid #c8d7e5;border-radius:12px;font:inherit;background:#fff}textarea{min-height:86px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.btnbar{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}button,.filebtn{border:0;border-radius:12px;padding:13px 16px;font-weight:800;cursor:pointer;font-size:15px}
.primary{background:var(--g);color:white}.secondary{background:white;color:var(--txt);border:1px solid #cddae7}.danger{background:white;color:#b91c1c;border:1px solid #fecaca}
.checkgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.chk{border:1px solid #dbe7f1;border-radius:12px;padding:10px;background:#fbfdff;text-transform:none;font-weight:500;color:#07345f;letter-spacing:0}.chk input{width:auto;margin-right:8px}
.scoreHero{border-radius:18px;padding:18px;background:#e8f8ee;border:1px solid #c7efd5;display:flex;justify-content:space-between;align-items:center}.big{font-size:58px;font-weight:900;color:#166534}
.reportcard{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}.grade{border:1px solid #dbe7f1;border-left:7px solid #16a34a;border-radius:14px;padding:14px;background:white}.grade.yellowline{border-left-color:#d9a100}.grade.redline{border-left-color:#dc2626}.grade b{text-transform:uppercase;letter-spacing:.05em;color:#5c748c;font-size:13px}.score{font-size:30px;font-weight:900}
.pill{display:inline-block;border-radius:999px;padding:6px 9px;font-size:12px;font-weight:800}.green{background:#dcfce7;color:#166534}.yellow{background:#fef3c7;color:#92400e}.red{background:#fee2e2;color:#991b1b}
.finding{border:1px solid #dbe7f1;border-radius:16px;padding:14px;background:#fbfdff;margin-top:12px}.finding-head{display:flex;justify-content:space-between;gap:10px;align-items:center}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}.photo-item{border:1px solid #dbe7f1;border-radius:14px;background:white;overflow:hidden}.photo-item img{width:100%;height:150px;object-fit:cover;cursor:pointer}.photo-meta{padding:10px}
.preview-frame{width:100%;height:900px;border:0;border-radius:12px;background:white}.toast{position:fixed;right:18px;top:18px;z-index:9999;display:none;max-width:390px;color:white;border-radius:14px;padding:14px 16px;font-weight:800;box-shadow:0 10px 24px rgba(0,0,0,.18)}.toast.ok{background:#16a34a}.toast.err{background:#dc2626}
.modal{display:none;position:fixed;z-index:99999;inset:0;background:rgba(0,0,0,.88);align-items:center;justify-content:center;padding:20px}.modal img{max-width:96vw;max-height:88vh;object-fit:contain}.modal .close{position:absolute;right:20px;top:18px;color:white;font-size:36px;font-weight:900;cursor:pointer}
@media(max-width:900px){.grid,.grid3,.row2,.checkgrid{grid-template-columns:1fr}.big{font-size:46px}.hero h1{font-size:24px}.preview-frame{height:700px}}
</style></head>
<body>
<div class="hero"><div class="hero-inner"><div class="logo">PV+</div><div><h1>PV+ Solar Health Report</h1><p>Field Inspection & Service System</p></div></div></div>
<div class="wrap">
<div class="grid">
<div class="card"><h2>Job Details</h2><div class="row2"><div><label>Date</label><input id="date" type="date"></div><div><label>Reference ID</label><input id="referenceId" placeholder="Auto if blank"></div></div><label>Customer</label><input id="customer"><label>Address</label><input id="address"><div class="row2"><div><label>Technician</label><input id="technician"></div><div><label>Service Type</label><select id="serviceType"><option>Realtor Inspection</option><option>Inspection</option><option>Service Call</option><option>Property Management Review</option><option>Monitoring Troubleshooting</option></select></div></div></div>
<div class="card"><h2>System Snapshot</h2><div class="row2"><div><label>PV Size (kW DC)</label><input id="pvSize"></div><div><label>Battery Size (kWh)</label><input id="batterySize"></div></div><div class="row2"><div><label>Monitoring</label><input id="monitoring" placeholder="Online / Offline / Partial"></div><div><label>Annual Production (kWh)</label><input id="annualProduction"></div></div><label>Inverter</label><input id="inverter" placeholder="Enphase / SolarEdge / SMA / Other"><label>Modules</label><input id="modules" placeholder="Brand / wattage / quantity"></div>
</div>
<div class="card"><h2>Solar Health Report Card™</h2><div id="scoreHero" class="scoreHero"></div><div style="margin-top:14px" id="reportCard" class="reportcard"></div></div>
<div class="grid">
<div class="card"><h2>Lifecycle / Suitability Inputs</h2><div class="row2"><div><label>Install Year</label><input id="installYear" type="number" placeholder="2020"></div><div><label>Estimated Offset</label><select id="offsetLevel"><option value="100">Strong offset / appropriately sized</option><option value="88">Moderate offset</option><option value="75">Limited offset / minimum mandate size</option><option value="60">Very limited offset</option></select></div></div><div class="row2"><div><label>Module Warranty Years</label><input id="moduleWarranty" type="number" value="25"></div><div><label>Inverter Warranty Years</label><input id="inverterWarranty" type="number" value="10"></div></div><label>Replacement Outlook</label><select id="replacementOutlook"><option value="95">Long-Term Use</option><option value="86">Plan Ahead</option><option value="74">Aging / Budget Planning</option><option value="60">Replacement Likely</option></select><label>Battery / Expansion Readiness</label><select id="batteryReadiness"><option value="95">Battery Ready</option><option value="85">Expansion Possible</option><option value="70">Requires Design Review</option><option value="55">Major Upgrades Likely</option></select></div>
<div class="card"><h2>Client Narrative</h2><label>Client-Friendly Summary</label><textarea id="summary"></textarea><label>What This Means</label><textarea id="educationalSummary"></textarea><label>Recommended PV+ Service Scope</label><textarea id="recommendations"></textarea><label>Inspector Score Adjustment</label><input id="manualAdjustment" type="number" value="0" min="-15" max="15"><label>Adjustment Reason</label><input id="adjustmentReason" placeholder="Minor cosmetic only / exceptional workmanship"></div>
</div>
<div class="card"><h2>Inspection Checklists</h2><div id="checklists"></div></div>
<div class="card"><h2>Detailed Findings & Positive Observations</h2><div id="findingsWrap"></div><div class="btnbar"><button class="secondary" onclick="addFinding()">Add Finding / Observation</button></div></div>
<div class="card"><h2>Photo Documentation</h2><div class="btnbar"><label class="secondary filebtn">Add Photos<input id="photosInput" type="file" accept="image/*" multiple style="display:none"></label><button class="danger" onclick="clearPhotos()">Clear Photos</button></div><div id="photoGrid" class="photo-grid"></div></div>
<div class="btnbar"><button class="secondary" onclick="refreshPreview()">Refresh Preview</button><button class="secondary" onclick="openPreview()">Open Report Preview</button><button class="primary" onclick="submitAll()">Submit to Google Drive</button></div>
<div class="card"><iframe id="previewFrame" class="preview-frame"></iframe></div>
</div>
<div id="toast" class="toast"></div><div id="photoModal" class="modal" onclick="closeModal()"><span class="close">&times;</span><img id="modalImg"></div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbw5lPnJKV1e_g2sqn7NE5CoTadJJnYDeHYzooF2n21K7tpjJ_tIyQyLNsPcRsnofLTn/exec";
let selectedPhotos=[];
const categories=[{name:"Array Condition",id:"array",items:[["Heavy soiling/debris",-10],["Broken/damaged module",-25],["Loose racking/rail",-18],["Animal intrusion",-15],["Corrosion/delamination",-12]]},{name:"Roof Condition",id:"roof",items:[["Failed sealant/flashing",-18],["Cracked tiles/roof damage",-18],["Ponding/drainage concern",-20],["Roof near replacement age",-20],["Penetration concern",-15]]},{name:"Array Performance",id:"performance",items:[["Monitoring offline",-25],["Inverter fault present",-28],["Shading concern",-15],["Production below expected",-22],["String/microinverter issue",-18]]},{name:"Electrical Safety",id:"electrical",items:[["Damaged conduit",-20],["Exposed conductors",-35],["Overheating signs",-35],["Improper labeling",-10],["Breaker/OCPD concern",-25]]}];
function byId(id){return document.getElementById(id)}function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}function nl2br(s){return esc(s).replace(/\n/g,"<br>")}function showToast(ok,msg){const t=byId("toast");t.className="toast "+(ok?"ok":"err");t.innerHTML=msg;t.style.display="block";setTimeout(()=>t.style.display="none",8000)}function status(score){score=Number(score);return score>=90?["green","Excellent"]:score>=80?["green","Good"]:score>=68?["yellow","Service Recommended"]:["red","Immediate Attention"]}
function initChecklists(){byId("checklists").innerHTML=categories.map(c=>`<div style="margin-bottom:16px"><h3>${c.name}</h3><div class="checkgrid">${c.items.map(it=>`<label class="chk"><input type="checkbox" data-cat="${c.id}" data-deduct="${it[1]}" onchange="refreshScoresOnly()">${it[0]} <small>(${it[1]})</small></label>`).join("")}</div></div>`).join("")}
function warrantyScore(){const y=Number(byId("installYear").value);const mw=Number(byId("moduleWarranty").value||25);const iw=Number(byId("inverterWarranty").value||10);if(!y)return 88;const age=new Date().getFullYear()-y;let s=88;if(Math.max(0,mw-age)<8)s-=8;if(Math.max(0,iw-age)<3)s-=8;if(Math.max(0,iw-age)<=0)s-=10;return Math.max(82,Math.min(100,s))}
function getFindings(){return [...document.querySelectorAll(".finding")].map(el=>({title:el.querySelector(".f-title").value,category:el.querySelector(".f-category").value,severity:el.querySelector(".f-severity").value,customDeduct:el.querySelector(".f-impact").value,issue:el.querySelector(".f-issue").value,why:el.querySelector(".f-why").value,action:el.querySelector(".f-action").value,cost:el.querySelector(".f-cost").value,timeline:el.querySelector(".f-timeline").value})).filter(f=>f.title||f.issue||f.action)}
function calculateScores(){let s={array:100,roof:100,performance:100,electrical:100};document.querySelectorAll("[data-cat]:checked").forEach(x=>s[x.dataset.cat]+=Number(x.dataset.deduct||0));getFindings().forEach(f=>{if(f.category&&s[f.category]!=null)s[f.category]+=Number(f.customDeduct||0)});Object.keys(s).forEach(k=>s[k]=Math.max(0,Math.min(100,s[k])));let equipment=Math.round((s.array+s.roof+s.performance+s.electrical)/4);let suitability=Number(byId("offsetLevel").value||90);let warranty=warrantyScore();let replacement=Number(byId("replacementOutlook").value||90);let battery=Number(byId("batteryReadiness").value||90);let manual=Number(byId("manualAdjustment").value||0);let overall=Math.max(0,Math.min(100,Math.round((equipment*.55)+(suitability*.25)+(warranty*.10)+(battery*.10)+manual)));return {...s,equipment,suitability,warranty,replacement,battery,overall}}
function refreshScoresOnly(){const s=calculateScores();const st=status(s.overall);byId("scoreHero").innerHTML=`<div><b>OVERALL SOLAR VALUE</b><h2>${st[1]}</h2></div><div class="big">${s.overall}<span style="font-size:22px">/100</span></div>`;const cards=[["Equipment Health",s.equipment],["Property Suitability",s.suitability],["Array Condition",s.array],["Roof Condition",s.roof],["Array Performance",s.performance],["Electrical Safety",s.electrical],["Warranty Outlook",s.warranty],["Replacement Options",s.replacement],["Ability to Expand / Add Battery",s.battery]];byId("reportCard").innerHTML=cards.map(c=>{const st=status(c[1]);const line=st[0]=="yellow"?"yellowline":st[0]=="red"?"redline":"";return `<div class="grade ${line}"><b>${c[0]}</b><div class="score">${c[1]}</div><span class="pill ${st[0]}">${st[1]}</span></div>`}).join("")}
function addFinding(){const w=document.createElement("div");w.className="finding";w.innerHTML=`<div class="finding-head"><strong>Finding / Observation</strong><button class="danger" onclick="this.closest('.finding').remove();refreshScoresOnly()">Remove</button></div><div class="row2"><div><label>Title</label><input class="f-title" placeholder="Example: Missing conduit strap"></div><div><label>Report Card Category</label><select class="f-category" onchange="refreshScoresOnly()"><option value="array">Array Condition</option><option value="roof">Roof Condition</option><option value="performance">Array Performance</option><option value="electrical">Electrical Safety</option></select></div></div><div class="row2"><div><label>Severity</label><select class="f-severity" onchange="setDefaultImpact(this);refreshScoresOnly()"><option>Positive Finding</option><option>Exceptional Quality</option><option>Satisfactory</option><option selected>Minor Observation</option><option>Monitor</option><option>Service Recommended</option><option>Immediate Attention</option><option>Red Flag</option></select></div><div><label>Score Impact</label><select class="f-impact" onchange="refreshScoresOnly()"><option value="8">+8 Positive</option><option value="12">+12 Exceptional</option><option value="0">0 Satisfactory</option><option value="-1">-1 Minor</option><option value="-2">-2 Minor</option><option value="-3" selected>-3 Minor</option><option value="-4">-4 Minor</option><option value="-5">-5 Minor</option><option value="-8">-8 Monitor</option><option value="-14">-14 Service Recommended</option><option value="-25">-25 Immediate Attention</option><option value="-35">-35 Red Flag</option></select></div></div><label>Observation / Issue Found</label><textarea class="f-issue"></textarea><label>Why It Matters</label><textarea class="f-why"></textarea><label>Corrective Action / Recommendation</label><textarea class="f-action"></textarea><div class="row2"><div><label>Estimated Cost</label><input class="f-cost" placeholder="$75–$150"></div><div><label>Timeline</label><input class="f-timeline" placeholder="Next service / within 30 days"></div></div>`;byId("findingsWrap").appendChild(w);refreshScoresOnly()}
function setDefaultImpact(sel){const map={"Positive Finding":"8","Exceptional Quality":"12","Satisfactory":"0","Minor Observation":"-3","Monitor":"-8","Service Recommended":"-14","Immediate Attention":"-25","Red Flag":"-35"};sel.closest(".finding").querySelector(".f-impact").value=map[sel.value]||"0"}
function renderPhotos(){const g=byId("photoGrid");g.innerHTML=selectedPhotos.length?selectedPhotos.map((p,i)=>`<div class="photo-item"><img src="${p.dataUrl}" onclick="openModal('${p.dataUrl}')"><div class="photo-meta"><small>${esc(p.name)}</small><label>Caption</label><input value="${esc(p.caption||"")}" oninput="selectedPhotos[${i}].caption=this.value"><button class="danger" onclick="selectedPhotos.splice(${i},1);renderPhotos()">Remove</button></div></div>`).join(""):`<div class="sub">No photos added yet.</div>`}
function openModal(src){byId("modalImg").src=src;byId("photoModal").style.display="flex"}function closeModal(){byId("photoModal").style.display="none";byId("modalImg").src=""}
function readFile(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file)})}async function handlePhotoSelect(files){for(const file of [...files])selectedPhotos.push({name:file.name,dataUrl:await readFile(file),caption:""});byId("photosInput").value="";renderPhotos()}function clearPhotos(){selectedPhotos=[];renderPhotos()}function newReference(){const d=new Date();return "PVP-"+d.toISOString().slice(0,19).replace(/[-:T]/g,"")}
function buildPayload(){const s=calculateScores();const st=status(s.overall);return{date:byId("date").value,referenceId:byId("referenceId").value.trim()||newReference(),customer:byId("customer").value,address:byId("address").value,technician:byId("technician").value,serviceType:byId("serviceType").value,pvSize:byId("pvSize").value,batterySize:byId("batterySize").value,monitoring:byId("monitoring").value,annualProduction:byId("annualProduction").value,inverter:byId("inverter").value,modules:byId("modules").value,overallScore:s.overall,equipmentHealth:s.equipment,propertySuitability:s.suitability,condition:st[1],categoryScores:s,summary:byId("summary").value,educationalSummary:byId("educationalSummary").value,recommendations:byId("recommendations").value,manualAdjustment:byId("manualAdjustment").value,adjustmentReason:byId("adjustmentReason").value,installYear:byId("installYear").value,moduleWarranty:byId("moduleWarranty").value,inverterWarranty:byId("inverterWarranty").value,findings:getFindings(),photos:selectedPhotos}}
function autoExecutive(p){return `The solar system appears to be in ${p.condition.toLowerCase()} condition based on the information observed during this inspection. This report separates equipment health from property suitability so a well-installed system is not unfairly penalized for being undersized, shaded, or limited by roof orientation.`}
function buildPreviewHtml(p){const scores=p.categoryScores;const cards=[["Equipment Health",p.equipmentHealth],["Property Suitability",p.propertySuitability],["Array Condition",scores.array],["Roof Condition",scores.roof],["Array Performance",scores.performance],["Electrical Safety",scores.electrical],["Warranty Outlook",scores.warranty],["Replacement Options",scores.replacement],["Ability to Expand / Add Battery",scores.battery]].map(c=>{const st=status(c[1]);return `<div class="grade"><b>${c[0]}</b><div class="score">${c[1]}</div><span class="pill ${st[0]}">${st[1]}</span></div>`}).join("");const findings=p.findings.length?p.findings.map((f,i)=>`<div class="finding"><b>${i+1}. ${esc(f.title)}</b><br><b>Severity:</b> ${esc(f.severity)} (${esc(f.customDeduct)} points)<p><b>Observation:</b><br>${nl2br(f.issue)}</p><p><b>Why it matters:</b><br>${nl2br(f.why)}</p><p><b>Recommendation:</b><br>${nl2br(f.action)}</p><p><b>Cost:</b> ${esc(f.cost)} | <b>Timeline:</b> ${esc(f.timeline)}</p></div>`).join(""):"<i>No detailed findings were entered.</i>";const photos=p.photos.length?p.photos.map(x=>`<div class="photo-card"><img src="${x.dataUrl}" onclick="openModal('${x.dataUrl}')"><h3>${esc(x.caption||x.name)}</h3><p>Click photo to enlarge.</p></div>`).join(""):"<i>No photos attached.</i>";return `<!doctype html><html><head><style>body{margin:0;font-family:Arial;color:#07345f;background:#f3f7fb}.hero{color:white;padding:34px;background:linear-gradient(90deg,#1c4f7c,#138aa0)}.wrap{padding:24px;max-width:1100px;margin:auto;background:white}.card,.finding{background:white;border:1px solid #dbe7f1;border-radius:18px;padding:18px;margin-bottom:16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grade{border:1px solid #dbe7f1;border-left:7px solid #16a34a;border-radius:14px;padding:14px}.score{font-size:30px;font-weight:900}.pill{display:inline-block;border-radius:999px;padding:6px 9px;font-size:12px;font-weight:800}.green{background:#dcfce7;color:#166534}.yellow{background:#fef3c7;color:#92400e}.red{background:#fee2e2;color:#991b1b}.scoreHero{border-radius:18px;padding:18px;background:#e8f8ee;border:1px solid #c7efd5;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.big{font-size:58px;font-weight:900;color:#166534}.photo-card{border:1px solid #dbe7f1;border-radius:16px;overflow:hidden}.photo-card img{width:100%;height:300px;object-fit:cover;cursor:pointer}.photo-card h3,.photo-card p{padding:0 14px}.modal{display:none;position:fixed;z-index:99999;inset:0;background:rgba(0,0,0,.88);align-items:center;justify-content:center;padding:20px}.modal img{max-width:96vw;max-height:88vh;object-fit:contain}.modal .close{position:absolute;right:20px;top:18px;color:#fff;font-size:36px;font-weight:900;cursor:pointer}@media(max-width:850px){.grid{grid-template-columns:1fr}}</style></head><body><div class="hero"><h1>Service & Inspection Report</h1><p>Prepared by PV+ for homeowners, realtors, and property managers.</p><p><b>${esc(p.customer)}</b> • ${esc(p.address)} • ${esc(p.date)} • ${esc(p.technician)}</p></div><div class="wrap"><h2>PV+ Solar Health Report Card™</h2><div class="scoreHero"><div><b>Overall Solar Value</b><h2>${esc(p.condition)}</h2></div><div class="big">${p.overallScore}<span style="font-size:22px">/100</span></div></div><div class="grid">${cards}</div><div class="card"><h2>Executive Summary</h2>${nl2br(autoExecutive(p))}</div><div class="card"><h2>System Snapshot</h2><div class="grid"><div><b>PV Size:</b> ${esc(p.pvSize)} kW DC</div><div><b>Battery:</b> ${esc(p.batterySize)} kWh</div><div><b>Monitoring:</b> ${esc(p.monitoring)}</div><div><b>Annual Production:</b> ${esc(p.annualProduction)} kWh</div><div><b>Inverter:</b> ${esc(p.inverter)}</div><div><b>Modules:</b> ${esc(p.modules)}</div></div></div><div class="card"><h2>What this means</h2>${nl2br(p.educationalSummary)}</div><div class="card"><h2>Detailed findings and positive observations</h2>${findings}</div><div class="card"><h2>Recommended PV+ service scope</h2>${nl2br(p.recommendations)}</div><div class="card"><h2>Photo documentation</h2><div class="grid">${photos}</div></div></div><div id="photoModal" class="modal" onclick="closeModal()"><span class="close">&times;</span><img id="modalImg"></div><script>function openModal(src){document.getElementById('modalImg').src=src;document.getElementById('photoModal').style.display='flex'}function closeModal(){document.getElementById('photoModal').style.display='none';document.getElementById('modalImg').src=''}</` + `script></body></html>`}
function refreshPreview(){refreshScoresOnly();byId("previewFrame").srcdoc=buildPreviewHtml(buildPayload())}function openPreview(){const w=window.open("","_blank");w.document.write(buildPreviewHtml(buildPayload()));w.document.close()}
async function submitAll(){const p=buildPayload();p.reportHtml=buildPreviewHtml(p);showToast(true,"Submitting to Google Drive...");try{await fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(p)});showToast(true,"Submitted. Check My Drive → PV Plus Service Reports for the new customer folder.");}catch(e){showToast(false,"Submit failed: "+e.message)}}
byId("photosInput").addEventListener("change",e=>handlePhotoSelect(e.target.files));byId("date").value=new Date().toISOString().slice(0,10);initChecklists();addFinding();renderPhotos();refreshScoresOnly();
</script></body></html>
